descriptor: PrevMaintNotify
description: Preventive maintenance notification
items:
  - gate: PrevMaintNotifyDaily
    access: private
    processing: realtime
    handlers:
      - type: script
        script: |
            // Execute SQL query to generate PrevMaintList report for NextDay
            def periodo = cmdb.selectLookupByCode("REP-PrevMaintList - Interval","NextDay");
            // Logic to send email with PrevMaintList report
            def reportFileName = cmdb.createReport("PrevMaintList", "PDF")
              .with("periodo", periodo)
              .download()
              .getUrl();
            cmdb.newMail()
              .withAttachment(reportFileName)
              .fromTemplate("PMN-NextDay")
              .send();

