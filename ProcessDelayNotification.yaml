# yaml-language-server: $schema=http://team.cmdbuild.org/resources/cmdbuild/etl/waterway/config/v1/schema.json
descriptor: ProcessDelayNotification
description: Process delay notification
items:

- gate: ProcessDelayNotificationSet
  access: private
  processing: realtime
  handlers:
  - type: script
    script: |
      import org.json.JSONArray;
      import org.json.JSONObject;
      def data = gate.getDataAsString();
      JSONArray jsonData = new JSONArray(data);
      boolean delayNotificDisabled = Boolean.parseBoolean(gate.getParam("delayNotificationDisabled"));
      for (int i = 0; i < jsonData.length(); i++) {
        JSONObject record = jsonData.getJSONObject(i);
        cmdb.existingProcessInstance(record.getString("type"), Long.parseLong(record.getString("id")))
          .with("DelayNotificDisabled", delayNotificDisabled)
          .update();
      }
      return true;

- gate: ProcessDelayNotificationSend
  access: private
  processing: realtime
  handlers:
  - type: script
    script: |
      //Send notifications when there are delays for processes
      // Define attributes
      def recurrent = Boolean.valueOf(gate.getParam("Notice-Recurrent"));
      def noticeType = gate.getParam("Notice-Type");

      // get all processes that are out of SLA
      def outOfSLAProcs = cmdb.system().sql().query("""
        SELECT DISTINCT proc."Id" 
        FROM "MaintProcess" proc 
          JOIN utils_process_sla_timings_get(proc."Id", _cm3_lookup('ProcessMaintSLA - State', 'Ongoing')) func ON TRUE 
        WHERE proc."Status" = 'A' AND _cm3_lookup_code(proc."FlowStatus") = 'open.running' AND func.amount > '0'::interval 
      """)

      outOfSLAProcs.each {
        // retrieve process data in order to correctly send notification
        def proc = cmdb.queryClass("MaintProcess")
          .with("Id", it.Id)
          .fetch()?[0];
        // if is not recurrent and LastSLADelayNotice is not null then process next element
        if (!recurrent && proc.get("LastSLADelayNotice") != null) return; 

        // send notification based on noticeType
        if (noticeType.split(",").any{it.equalsIgnoreCase("email")}) {
          // Retrieve email data
          def emailFields = cmdb.callFunction("wf_maintprocess_email_builder")
            .with("process_id", proc.get("Id"))
            .with("template_name", "Process-DueDates-Delay")
            .execute();

          // Send email
          cmdb.newMail()
            .withCard(proc.get("Id"))
            .withFrom(emailFields.get("from_address"))
            .withTo(emailFields.get("to_addresses"))
            .withCc(emailFields.get("cc_addresses"))
            .withBcc(emailFields.get("bcc_addresses"))
            .withSubject(emailFields.get("subject"))
            .withContent(emailFields.get("body"))
            .withSignature(emailFields.get("signature_code"))
            .send();          
        }

        if (noticeType.split(",").any{it.equalsIgnoreCase("inapp")}) {
          def map = [:];
          map.put("Card", proc);
          def roles = ["role":"MaintOffice"];
          // add data to map
          map.put("To", roles.get("role"));
          
          // send notification
          cmdb.newMail()
            .withProvider("chat")
            .withCard("CorrectiveMaint", proc.get("Id"))
            .fromTemplate("InApp_Process-DueDate-Delay", map)
            .send();
        }
        
        // set LastSLADelayNotice = new Date()
        cmdb.existingProcessInstance("MaintProcess", proc.get("Id"))
          .with("LastSLADelayNotice", new Date())
          .update();
      }

      // reset LastSLADelayNotice for processes that are no longer out of SLA
      cmdb.queryClass("MaintProcess")
        .with("FlowStatus", "1")
        .fetch()
        .findAll{it.get("LastSLADelayNotice") != null}
        .id
        .findAll{id -> !outOfSLAProcs.contains(id)}
        .each {
          cmdb.existingProcessInstance("MaintProcess", it)
            .with("LastSLADelayNotice", null)
            .update();
        };